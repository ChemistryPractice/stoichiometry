<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoichiometry Master</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e67e22; --error: #c0392b; --bg: #f4f7f6; --sidebar: #34495e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar Styles */
        .sidebar { width: 220px; background: var(--sidebar); color: white; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 20px; border-bottom: 2px solid var(--accent); padding-bottom: 10px; }
        .side-btn { background: transparent; border: 1px solid rgba(255,255,255,0.3); color: white; padding: 12px; text-align: left; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .side-btn:hover, .side-btn.active { background: var(--accent); border-color: var(--accent); }

        /* Main Content */
        .main-content { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        
        #equation-display { font-size: 1.8rem; font-weight: bold; margin: 20px 0; text-align: center; letter-spacing: 1px; color: var(--primary); }
        .problem-box { background: #f9f9f9; padding: 20px; border-radius: 15px; border-left: 5px solid var(--accent); margin: 20px 0; font-size: 1.1rem; line-height: 1.5; }
        
        .gen-btn { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1rem; margin-bottom: 10px; }
        .check-btn { background: var(--error); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; opacity: 0.9; }
        
        #answer-display { margin-top: 20px; padding: 20px; border-radius: 10px; background: #fff5f5; color: #2c3e50; display: none; border: 1px solid #fab1a0; }
        #answer-display.visible { display: block; }

        /* Fraction Styling */
        .setup-container { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; font-family: 'Courier New', monospace; margin-top: 15px; }
        .fraction { display: inline-block; vertical-align: middle; text-align: center; margin: 0 5px; }
        .numerator { display: block; border-bottom: 2px solid var(--primary); padding: 0 5px; }
        .denominator { display: block; padding: 0 5px; }
        sub { font-size: 0.7em; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Stoichiometry</h2>
    <button class="side-btn" onclick="setMode('mole-mole', this)">Mole ↔ Mole</button>
    <button class="side-btn" onclick="setMode('mole-mass', this)">Mole ↔ Mass</button>
    <button class="side-btn" onclick="setMode('mole-part', this)">Mole ↔ Particles</button>
    <button class="side-btn" onclick="setMode('mole-vol', this)">Mole ↔ Volume (STP)</button>
    <button class="side-btn" onclick="setMode('mass-mass', this)">Mass ↔ Mass </button>
    <button class="side-btn" onclick="setMode('titration', this)">Titration</button>
    <button class="side-btn" onclick="setMode('limiting-reactant', this)">Limiting Reactant</button>
</div>

<div class="main-content">
    <div class="card">
        <h1 id="title-display">Select a Category</h1>
        <button class="gen-btn" onclick="generateProblem()">Generate New Problem</button>
        
        <div id="equation-display">Select a type from the left...</div>
        
        <div id="problem-text" class="problem-box">
            Please select a problem type from the sidebar to begin your practice.
        </div>

        <button class="check-btn" onclick="showAnswer()">Show Step-by-Step Answer</button>
        
        <div id="answer-display"></div>
    </div>
</div>

<script>
    function toSigFigs(num, sigFigs) {
    if (num == 0) return 0;
    const d = Math.ceil(Math.log10(num < 0 ? -num : num));
    const power = sigFigs - d;
    const magnitude = Math.pow(10, power);
    const shifted = Math.round(num * magnitude);
    const result = shifted / magnitude;
    
    // This ensures we keep trailing zeros (e.g., 5.00 instead of 5)
    return result.toFixed(Math.max(0, power));
}

    // Helper to count sig figs of input (simple version for class use)
    function countSigFigs(str) {
        let s = str.replace('.', '');
    // Remove leading zeros
        s = s.replace(/^0+/, '');
        return s.length;
}
    function formatScientific(val, sf) {
    let exponent = 23;
    let mantissa = val;

    // Normalize: If mantissa is 10 or higher, move decimal left, increase exponent
    while (mantissa >= 10) {
        mantissa /= 10;
        exponent += 1;
    }
    // If mantissa is less than 1 (and not 0), move decimal right, decrease exponent
    while (mantissa < 1 && mantissa !== 0) {
        mantissa *= 10;
        exponent -= 1;
    }

    return `${toSigFigs(mantissa, sf)} &times; 10<sup>${exponent}</sup>`;
}
    
const data = {
    elements: { "H": 1.01, "O": 16.00, "Na": 22.99, "Cl": 35.45, "C": 12.01, "N": 14.01, "S": 32.06, "K": 39.10, "Ca": 40.08, "Mg": 24.31, "P": 30.97, "Fe": 55.85, "Pb": 207.2, "I": 126.90, "Ba": 137.33, "F": 19.00, "Si": 28.09, "Al": 26.98, "Zn": 65.38 },
    
    equations: [
        // Original Set
        { eq: "2H₂ + O₂ → 2H₂O", ratio: [2, 1, 2], names: ["H₂", "O₂", "H₂O"], masses: [2.02, 32.00, 18.02] },
        { eq: "N₂ + 3H₂ → 2NH₃", ratio: [1, 3, 2], names: ["N₂", "H₂", "NH₃"], masses: [28.02, 6.06, 17.03] },
        { eq: "CH₄ + 2O₂ → CO₂ + 2H₂O", ratio: [1, 2, 1, 2], names: ["CH₄", "O₂", "CO₂", "H₂O"], masses: [16.04, 32.00, 44.01, 18.02] },
        { eq: "2Na + Cl₂ → 2NaCl", ratio: [2, 1, 2], names: ["Na", "Cl₂", "NaCl"], masses: [22.99, 70.90, 58.44] },
        { eq: "CaCO₃ → CaO + CO₂", ratio: [1, 1, 1], names: ["CaCO₃", "CaO", "CO₂"], masses: [100.09, 56.08, 44.01] },
        
        // New Practice Set
        { eq: "2Mg + O₂ → 2MgO", ratio: [2, 1, 2], names: ["Mg", "O₂", "MgO"], masses: [24.31, 32.00, 40.31] },
        { eq: "2KClO₃ → 2KCl + 3O₂", ratio: [2, 2, 3], names: ["KClO₃", "KCl", "O₂"], masses: [122.55, 74.55, 32.00] },
        { eq: "C₃H₈ + 5O₂ → 3CO₂ + 4H₂O", ratio: [1, 5, 3, 4], names: ["C₃H₈", "O₂", "CO₂", "H₂O"], masses: [44.11, 32.00, 44.01, 18.02] },
        { eq: "2Al + 3Cl₂ → 2AlCl₃", ratio: [2, 3, 2], names: ["Al", "Cl₂", "AlCl₃"], masses: [26.98, 70.90, 133.33] },
        { eq: "Zn + 2HCl → ZnCl₂ + H₂", ratio: [1, 2, 1, 1], names: ["Zn", "HCl", "ZnCl₂", "H₂"], masses: [65.38, 36.46, 136.28, 2.02] },
        { eq: "2H₂O₂ → 2H₂O + O₂", ratio: [2, 2, 1], names: ["H₂O₂", "H₂O", "O₂"], masses: [34.02, 18.02, 32.00] },
        { eq: "Fe₂O₃ + 3CO → 2Fe + 3CO₂", ratio: [1, 3, 2, 3], names: ["Fe₂O₃", "CO", "Fe", "CO₂"], masses: [159.70, 28.01, 55.85, 44.01] },
        { eq: "2Na + 2H₂O → 2NaOH + H₂", ratio: [2, 2, 2, 1], names: ["Na", "H₂O", "NaOH", "H₂"], masses: [22.99, 18.02, 40.00, 2.02] },
        { eq: "Pb(NO₃)₂ + 2KI → PbI₂ + 2KNO₃", ratio: [1, 2, 1, 2], names: ["Pb(NO₃)₂", "KI", "PbI₂", "KNO₃"], masses: [331.22, 166.00, 461.01, 101.10] },
        { eq: "Mg(OH)₂ + 2HCl → MgCl₂ + 2H₂O", ratio: [1, 2, 1, 2], names: ["Mg(OH)₂", "HCl", "MgCl₂", "H₂O"], masses: [58.33, 36.46, 95.21, 18.02] },
        { eq: "4Al + 3O₂ → 2Al₂O₃", ratio: [4, 3, 2], names: ["Al", "O₂", "Al₂O₃"], masses: [26.98, 32.00, 101.96] },
        { eq: "2C₂H₆ + 7O₂ → 4CO₂ + 6H₂O", ratio: [2, 7, 4, 6], names: ["C₂H₆", "O₂", "CO₂", "H₂O"], masses: [30.08, 32.00, 44.01, 18.02] },
        { eq: "BaCl₂ + Na₂SO₄ → BaSO₄ + 2NaCl", ratio: [1, 1, 1, 2], names: ["BaCl₂", "Na₂SO₄", "BaSO₄", "NaCl"], masses: [208.23, 142.04, 233.39, 58.44] },
        { eq: "SiO₂ + 4HF → SiF₄ + 2H₂O", ratio: [1, 4, 1, 2], names: ["SiO₂", "HF", "SiF₄", "H₂O"], masses: [60.08, 20.01, 104.08, 18.02] },
        { eq: "CaC₂ + 2H₂O → Ca(OH)₂ + C₂H₂", ratio: [1, 2, 1, 1], names: ["CaC₂", "H₂O", "Ca(OH)₂", "C₂H₂"], masses: [64.10, 18.02, 74.10, 26.04] }
    ],
    
    titrations: [
        { eq: "1HCl + 1NaOH → 1NaCl + 1H₂O", acid: "HCl", base: "NaOH", cA: 1, cB: 1 },
        { eq: "1H₂SO₄ + 2NaOH → 1Na₂SO₄ + 2H₂O", acid: "H₂SO₄", base: "NaOH", cA: 1, cB: 2 },
        { eq: "2HCl + 1Ca(OH)₂ → 1CaCl₂ + 2H₂O", acid: "HCl", base: "Ca(OH)₂", cA: 2, cB: 1 }
    ]
};

    let currentMode = '';
    let currentData = {};

    function setMode(mode, btn) {
    currentMode = mode;
    
    // 1. Manage button highlighting
    document.querySelectorAll('.side-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    // 2. Update the Title
    document.getElementById('title-display').innerText = btn.innerText;
    
    // 3. CLEAR existing content
    document.getElementById('equation-display').innerHTML = "Click 'Generate' to begin!";
    document.getElementById('problem-text').innerHTML = "New problem type selected. Ready when you are.";
    
    // 4. Hide and clear the answer box
    const ad = document.getElementById('answer-display');
    ad.classList.remove('visible');
    ad.innerHTML = "";
    
    // Reset internal data so "Show Answer" doesn't trigger on old data
    currentData = {};
}

    // This regex only targets numbers that follow a letter or a ')'
function formatSub(text) { 
    return text.replace(/([A-Za-z\)])(\d+)/g, '$1<sub>$2</sub>'); 
}

    function generateProblem() {
    if (!currentMode) return alert("Select a type from the sidebar first!");
    document.getElementById('answer-display').classList.remove('visible');
    
    // 1. Handle Titration separately to preserve its working logic
    if (currentMode === 'titration') {
        const t = data.titrations[Math.floor(Math.random() * data.titrations.length)];
        const solveForVol = Math.random() > 0.5;
        const knownM = (Math.random() * 0.4 + 0.1).toFixed(3);
        const knownV = (Math.random() * 30 + 10).toFixed(2);
        const unknownVal = (Math.random() * 0.4 + 0.1).toFixed(3);
        
        currentData = { ...t, knownM, knownV, unknownVal, solveForVol, type: 'titration' };
        document.getElementById('equation-display').innerHTML = formatSub(t.eq);
        
        if (solveForVol) {
            document.getElementById('problem-text').innerHTML = 
                `What <b>volume (mL)</b> of ${unknownVal} M ${t.base} is needed to completely neutralize ${knownV} mL of ${knownM} M ${t.acid}?`;
        } else {
            document.getElementById('problem-text').innerHTML = 
                `What is the <b>molarity</b> of the ${t.acid} solution if ${knownV} mL of it is neutralized by ${unknownVal} mL of ${knownM} M ${t.base}?`;
        }
        return;
    }

    // 2. Standard Stoichiometry Logic with Randomization
    const eqSet = data.equations[Math.floor(Math.random() * data.equations.length)];
    const val = (Math.random() * 5 + 1).toFixed(2);
    
    let idxA = Math.floor(Math.random() * eqSet.names.length);
    let idxB = Math.floor(Math.random() * eqSet.names.length);
    while(idxA === idxB) idxB = Math.floor(Math.random() * eqSet.names.length);

    // 0: Start with Moles, End with Unit | 1: Start with Unit, End with Moles
    const direction = Math.floor(Math.random() * 2); 

    currentData = {
        eq: eqSet.eq,
        nameA: eqSet.names[idxA],
        nameB: eqSet.names[idxB],
        coeffA: eqSet.ratio[idxA],
        coeffB: eqSet.ratio[idxB],
        massA: eqSet.masses[idxA],
        massB: eqSet.masses[idxB],
        inputVal: val,
        direction: direction,
        mode: currentMode
    };

    document.getElementById('equation-display').innerHTML = formatSub(currentData.eq);
    
    let pText = "";
    const nameA = formatSub(currentData.nameA);
    const nameB = formatSub(currentData.nameB);

    switch(currentMode) {
        case 'mole-mole': 
            pText = `If <b>${val} moles</b> of ${nameA} react, how many <b>moles</b> of ${nameB} are involved?`; 
            break;
        case 'mole-mass': 
            pText = direction === 0 
                ? `How many <b>grams</b> of ${nameB} are involved if <b>${val} moles</b> of ${nameA} react?`
                : `How many <b>moles</b> of ${nameB} are involved if <b>${val} grams</b> of ${nameA} react?`;
            break;
        case 'mole-part': 
            pText = direction === 0 
                ? `How many <b>formula units</b> of ${nameB} are involved if <b>${val} moles</b> of ${nameA} react?`
                : `How many <b>moles</b> of ${nameB} are involved if <b>${val} x 10²³ units</b> of ${nameA} react?`;
            break;
        case 'mole-vol': 
            pText = direction === 0 
                ? `What <b>volume (L)</b> of ${nameB} gas (STP) is involved if <b>${val} moles</b> of ${nameA} react?`
                : `How many <b>moles</b> of ${nameB} are involved if <b>${val} Liters</b> of ${nameA} gas react at STP?`;
            break;
        // Inside generateProblem()
        case 'mass-mass':
            pText = `What <b>mass (grams)</b> of ${nameB} is involved if <b>${val} grams</b> of ${nameA} react?`;
            currentData.mode = 'mass-mass';
            break;
    }
    document.getElementById('problem-text').innerHTML = pText;
}

function frac(n, d) { return `<div class="fraction"><span class="numerator">${n}</span><span class="denominator">${d}</span></div>`; }

function showAnswer() {
    if (!currentData.eq && currentData.type !== 'titration') return;
    
    const ad = document.getElementById('answer-display');
    ad.classList.add('visible');
    const d = currentData;
    const v = d.inputVal;
    
    // Determine sig figs from input (Titration uses knownM, Stoich uses inputVal)
    const sf = d.type === 'titration' ? countSigFigs(d.knownM.toString()) : countSigFigs(v.toString());
    
    let steps = "";

    // 1. Titration Logic with Sig Figs
    if (d.type === 'titration') {
        let mathSteps = "";
        if (d.solveForVol) {
            const molesAcid = (d.knownM * (d.knownV / 1000));
            const molesBase = (molesAcid * (d.cB / d.cA));
            const finalVol = (molesBase / d.unknownVal * 1000);

            mathSteps = `
                1. Moles ${d.acid}: (${d.knownM} M) &times; (${(d.knownV/1000).toFixed(4)} L) = ${molesAcid.toFixed(5)} mol<br>
                2. Mole Ratio: ${molesAcid.toFixed(5)} mol ${d.acid} &times; ${frac(d.cB+' mol '+d.base, d.cA+' mol '+d.acid)} = ${molesBase.toFixed(5)} mol ${d.base}<br>
                3. Final Volume: ${frac(molesBase.toFixed(5) + ' mol', d.unknownVal + ' M')} &times; 1000 = <b>${toSigFigs(finalVol, sf)} mL ${d.base}</b>
            `;
        } else {
            const molesBase = (d.knownM * (d.unknownVal / 1000));
            const molesAcid = (molesBase * (d.cA / d.cB));
            const finalM = (molesAcid / (d.knownV / 1000));

            mathSteps = `
                1. Moles ${d.base}: (${d.knownM} M) &times; (${(d.unknownVal/1000).toFixed(4)} L) = ${molesBase.toFixed(5)} mol<br>
                2. Mole Ratio: ${molesBase.toFixed(5)} mol ${d.base} &times; ${frac(d.cA+' mol '+d.acid, d.cB+' mol '+d.base)} = ${molesAcid.toFixed(5)} mol ${d.acid}<br>
                3. Final Molarity: ${frac(molesAcid.toFixed(5) + ' mol', (d.knownV/1000).toFixed(4) + ' L')} = <b>${toSigFigs(finalM, sf)} M ${d.acid}</b>
            `;
        }
        ad.innerHTML = `<strong>Titration Solution:</strong><div class="setup-container" style="display:block;">${formatSub(mathSteps)}</div><br><small><i>Rounded to ${sf} sig figs based on ${d.type === 'titration' ? 'molarity' : 'input'}.</i></small>`;
        return;
    }

    // 2. Standard Stoichiometry Logic with Sig Figs and Mass-Mass
    const ratioFrac = frac(`${d.coeffB} mol ${d.nameB}`, `${d.coeffA} mol ${d.nameA}`);

    if (d.mode === 'mole-mole') {
        const ans = v * (d.coeffB / d.coeffA);
        steps = `${v} mol ${d.nameA} &times; ${ratioFrac} = <b>${toSigFigs(ans, sf)} mol ${d.nameB}</b>`;
    } 
    else if (d.mode === 'mole-mass') {
        if (d.direction === 0) { // Mol to Gram
            const ans = v * (d.coeffB / d.coeffA) * d.massB;
            steps = `${v} mol ${d.nameA} &times; ${ratioFrac} &times; ${frac(d.massB + ' g', '1 mol')} = <b>${toSigFigs(ans, sf)} g ${d.nameB}</b>`;
        } else { // Gram to Mol
            const ans = v / d.massA * (d.coeffB / d.coeffA);
            steps = `${v} g ${d.nameA} &times; ${frac('1 mol', d.massA + ' g')} &times; ${ratioFrac} = <b>${toSigFigs(ans, sf)} mol ${d.nameB}</b>`;
        }
    }
    // Replace the mole-part block in showAnswer with this:
    else if (d.mode === 'mole-part') {
    if (d.direction === 0) { // Mol to Particles
        // We calculate based on the 6.022 multiplier
        const rawMantissa = v * (d.coeffB / d.coeffA) * 6.022;
        const resultHTML = formatScientific(rawMantissa, sf);
        
        steps = `${v} mol ${d.nameA} &times; ${ratioFrac} &times; ${frac('6.022&times;10²³ units', '1 mol')} = <b>${resultHTML} units</b>`;
        } else { // Particles to Mol
        // v here is the mantissa (e.g., 5.40 from 5.40 x 10^23)
        const rawMol = (v / 6.022) * (d.coeffB / d.coeffA);
        
        steps = `${v}&times;10²³ units &times; ${frac('1 mol', '6.022&times;10²³ units')} &times; ${ratioFrac} = <b>${toSigFigs(rawMol, sf)} mol ${d.nameB}</b>`;
        }
    }
    else if (d.mode === 'mole-vol') {
        if (d.direction === 0) { // Mol to Volume
            const ans = v * (d.coeffB / d.coeffA) * 22.4;
            steps = `${v} mol ${d.nameA} &times; ${ratioFrac} &times; ${frac('22.4 L', '1 mol')} = <b>${toSigFigs(ans, sf)} L ${d.nameB}</b>`;
        } else { // Volume to Mol
            const ans = v / 22.4 * (d.coeffB / d.coeffA);
            steps = `${v} L ${d.nameA} &times; ${frac('1 mol', '22.4 L')} &times; ${ratioFrac} = <b>${toSigFigs(ans, sf)} mol ${d.nameB}</b>`;
        }
    }
    else if (d.mode === 'mass-mass') {
        const ans = (v / d.massA) * (d.coeffB / d.coeffA) * d.massB;
        steps = `${v} g ${d.nameA} &times; ${frac('1 mol', d.massA + ' g')} &times; ${ratioFrac} &times; ${frac(d.massB + ' g', '1 mol')} = <b>${toSigFigs(ans, sf)} g ${d.nameB}</b>`;
    }

    ad.innerHTML = `<strong>Step-by-Step Setup:</strong><div class="setup-container">${formatSub(steps)}</div><br><small><i>Rounded to ${sf} sig figs based on input value.</i></small>`;
}
</script>

</body>
</html>
